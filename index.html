<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050508">

    <!-- favicon / home screen icon -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

    <title>変なクイズ</title>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/screens.css">
    <link rel="stylesheet" href="styles/keyboard.css">
    <link rel="stylesheet" href="styles/gimmicks.css">
    <link rel="stylesheet" href="styles/effects.css">
    <link rel="stylesheet" href="styles/navigator.css">
    <link rel="stylesheet" href="styles/settings.css">
    <link rel="stylesheet" href="styles/home-menu.css">
    <link rel="stylesheet" href="styles/ranking.css">
    <link rel="stylesheet" href="styles/home-screen.css">
    <link rel="stylesheet" href="styles/profile-screen.css">
    <link rel="stylesheet" href="styles/scores-screen.css">
    <link rel="stylesheet" href="styles/tab-bar.css">
</head>
<body>
    <div id="stage">
        <div id="app"></div>
    </div>

    <!-- 横向きガード: @media (orientation: landscape) で表示される。
         Capacitor ネイティブでは capacitor.config で portrait lock するが、
         Web / PWA 版はブラウザ側で回転禁止できないのでオーバーレイで遮断。 -->
    <div id="rotate-guard" aria-hidden="true">
        <div class="rg-inner">
            <div class="rg-icon">⟲</div>
            <div class="rg-title">縦向きに戻してください</div>
            <div class="rg-desc">このゲームは縦画面専用です。</div>
        </div>
    </div>

    <!-- 設定・状態 -->
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/save.js"></script>
    <script src="js/haptics.js"></script>
    <script src="js/avatars.js"></script>
    <script src="js/dialogs.js"></script>
    <script src="js/router.js"></script>

    <!-- クイズ -->
    <script src="js/quiz/loader.js"></script>
    <script src="js/quiz/judge.js"></script>
    <script src="js/ranks.js"></script>
    <script src="js/scoring.js"></script>

    <!-- 内製文字盤 -->
    <script src="js/keyboard/layouts.js"></script>
    <script src="js/keyboard/keyboard.js"></script>

    <!-- 崩壊UIギミック -->
    <script src="js/gimmicks/registry.js"></script>
    <script src="js/gimmicks/selector.js"></script>
    <script src="js/gimmicks/engine.js"></script>

    <!-- シェア -->
    <script src="js/share/shareCard.js"></script>
    <script src="js/share/shareSheet.js"></script>

    <!-- オンライン (α Prep: localStorage + seed JSON) -->
    <script src="js/online/ranking.js"></script>

    <!-- UI コンポーネント -->
    <script src="js/ui/navigator.js"></script>
    <script src="js/ui/settings.js"></script>
    <script src="js/ui/homeMenu.js"></script>
    <script src="js/ui/tabBar.js"></script>

    <!-- サウンド (SE / BGM) -->
    <script src="js/audio.js"></script>
    <script src="js/bgm.js"></script>

    <!-- 演出 -->
    <script src="js/effects/floatingText.js"></script>
    <script src="js/effects/vhs.js"></script>

    <!-- 開発用 -->
    <script src="js/debug.js"></script>

    <!-- 画面 -->
    <script src="js/screens/title.js"></script>
    <script src="js/screens/home.js"></script>
    <script src="js/screens/stageSelect.js"></script>
    <script src="js/screens/question.js"></script>
    <script src="js/screens/result.js"></script>
    <script src="js/screens/ranking.js"></script>
    <script src="js/screens/profile.js"></script>
    <script src="js/screens/scores.js"></script>

    <!-- Capacitor ネイティブ層ブリッジ (Web では no-op) -->
    <script src="js/capacitor-init.js"></script>

    <!-- エントリ -->
    <script src="js/main.js"></script>
</body>
</html>
